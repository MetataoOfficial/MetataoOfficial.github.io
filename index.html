<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归元静坐</title>
<style>
  :root {
    --bg-1: #1a2230;
    --bg-2: #08101a;
    --accent: #c9a76a;
    --text: #e8e0cf;
    --muted: rgba(232, 224, 207, 0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Songti SC', serif;
    background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-2) 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .title {
    font-size: 1.4rem;
    letter-spacing: 0.5em;
    padding-left: 0.5em;
    margin-top: 12px;
    opacity: 0.85;
    font-weight: 300;
  }
  .canvas-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 240px;
  }
  #canvas { cursor: pointer; display: block; }
  .status {
    position: absolute;
    bottom: 8px;
    width: 100%;
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 0.3em;
    padding-left: 0.3em;
    color: var(--muted);
    pointer-events: none;
    transition: opacity 1s;
  }
  .timer {
    font-size: 1.05rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    margin: 4px 0 14px;
    min-height: 1.4em;
  }
  .controls { width: 100%; max-width: 620px; }
  .durations {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 8px;
    margin-bottom: 14px;
  }
  .dur-btn {
    background: transparent;
    border: 1px solid rgba(201, 167, 106, 0.25);
    color: var(--text);
    padding: 5px 11px;
    border-radius: 18px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }
  .dur-btn:hover { border-color: rgba(201, 167, 106, 0.55); }
  .dur-btn.active {
    background: rgba(201, 167, 106, 0.18);
    border-color: var(--accent);
    color: var(--accent);
  }
  .dur-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .volume-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 0.82rem;
    color: var(--muted);
    padding-bottom: 12px;
  }
  .volume-row input[type=range] {
    width: 200px;
    accent-color: var(--accent);
  }
  @media (max-width: 480px) {
    .title { font-size: 1.15rem; }
    .dur-btn { padding: 4px 9px; font-size: 0.78rem; }
    .volume-row input[type=range] { width: 160px; }
  }
</style>
</head>
<body>
  <div class="title">归元静坐</div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="status" id="status">点击开始</div>
  </div>

  <div class="timer" id="timer"></div>

  <div class="controls">
    <div class="durations" id="durations"></div>
    <div class="volume-row">
      <span>音量</span>
      <input type="range" id="volume" min="0" max="100" value="65">
    </div>
  </div>

<script>
/* ============================================================
   Audio Engine — soft, layered, no noise floor
   ============================================================ */
class MeditationAudio {
  constructor() {
    this.ctx = null;
    this.padNodes = [];
    this.melodyTimer = null;
    this.breathTimer = null;
    this.onMelodyNote = null;
    this.onBellStrike = null;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Master
    this.master = this.ctx.createGain();
    this.master.gain.value = 0;
    this.master.connect(this.ctx.destination);

    // Gentle reverb (clean tail, no hiss)
    this.reverb = this.ctx.createConvolver();
    this.reverb.buffer = this._makeReverb(4.5, 2.8);
    this.reverbWet = this.ctx.createGain();
    this.reverbWet.gain.value = 0.32;
    this.reverb.connect(this.reverbWet);
    this.reverbWet.connect(this.master);

    // Soft low-pass to keep things warm and round
    this.tone = this.ctx.createBiquadFilter();
    this.tone.type = 'lowpass';
    this.tone.frequency.value = 2400;
    this.tone.Q.value = 0.5;
    this.tone.connect(this.master);
    this.tone.connect(this.reverb);

    // Layer buses
    this.padBus = this.ctx.createGain();    this.padBus.gain.value = 0.20;
    this.melBus = this.ctx.createGain();    this.melBus.gain.value = 0.14;
    this.bellBus = this.ctx.createGain();   this.bellBus.gain.value = 0.40;
    this.padBus.connect(this.tone);
    this.melBus.connect(this.tone);
    this.bellBus.connect(this.tone);
  }

  _makeReverb(duration, decay) {
    const rate = this.ctx.sampleRate;
    const length = rate * duration;
    const impulse = this.ctx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        const t = i / length;
        // Smooth decay; halved random amplitude for cleaner tail
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay) * 0.45;
      }
    }
    return impulse;
  }

  setVolume(v) {
    if (!this.master) return;
    const t = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.linearRampToValueAtTime(v, t + 0.4);
  }

  fadeMasterIn(seconds = 1.5, target = null) {
    const t = this.ctx.currentTime;
    const v = target !== null ? target : this.master.gain.value;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(0, t);
    this.master.gain.linearRampToValueAtTime(v, t + seconds);
  }

  /* ---------- Soft singing-bowl bell ---------- */
  playBell(when = 0, freq = 246.94, duration = 10) {
    const t0 = this.ctx.currentTime + when;
    const partials = [
      { mult: 1.0,  gain: 1.00, dec: duration        },
      { mult: 2.01, gain: 0.45, dec: duration * 0.75 },
      { mult: 3.02, gain: 0.22, dec: duration * 0.55 },
      { mult: 4.18, gain: 0.12, dec: duration * 0.40 },
      { mult: 5.45, gain: 0.06, dec: duration * 0.30 }
    ];
    const env = this.ctx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(1, t0 + 0.012);
    env.gain.exponentialRampToValueAtTime(0.0005, t0 + duration);
    env.connect(this.bellBus);

    partials.forEach(p => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq * p.mult;
      const g = this.ctx.createGain();
      g.gain.value = 0;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(p.gain, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + p.dec);
      // tiny detune for shimmer
      const det = this.ctx.createOscillator();
      det.frequency.value = 0.4;
      const detGain = this.ctx.createGain();
      detGain.gain.value = freq * p.mult * 0.0008;
      det.connect(detGain);
      detGain.connect(osc.frequency);

      osc.connect(g); g.connect(env);
      osc.start(t0); det.start(t0);
      osc.stop(t0 + duration + 0.2);
      det.stop(t0 + duration + 0.2);
    });

    if (this.onBellStrike) setTimeout(() => this.onBellStrike(), when * 1000);
  }

  /* ---------- Soft pad (drone with rich layers) ---------- */
  startPad(fadeIn = 9) {
    const t0 = this.ctx.currentTime;

    // Root F2 + fifth C3 + octave F3 + soft high C4
    // Multiple slightly-detuned voices = richer body without noise
    const voices = [
      { f: 87.31,  type: 'sine',     gain: 0.55, det:  0  },
      { f: 87.31,  type: 'sine',     gain: 0.30, det:  6  },
      { f: 87.31,  type: 'sine',     gain: 0.30, det: -7  },
      { f: 130.81, type: 'sine',     gain: 0.40, det:  0  },
      { f: 130.81, type: 'sine',     gain: 0.22, det:  4  },
      { f: 174.61, type: 'triangle', gain: 0.28, det:  0  },
      { f: 174.61, type: 'sine',     gain: 0.18, det: -3  },
      { f: 261.63, type: 'sine',     gain: 0.10, det:  0  } // soft sparkle
    ];

    // Slow breathing LFO (6s cycle) → amplitude
    this.padFade = this.ctx.createGain();
    this.padFade.gain.setValueAtTime(0, t0);
    this.padFade.gain.linearRampToValueAtTime(1, t0 + fadeIn);
    this.padFade.connect(this.padBus);

    const breath = this.ctx.createGain();
    breath.gain.value = 1;
    breath.connect(this.padFade);

    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 1 / 6; // 6-second breath
    const lfoAmt = this.ctx.createGain();
    lfoAmt.gain.value = 0.18;
    lfo.connect(lfoAmt);
    lfoAmt.connect(breath.gain);
    lfo.start();
    this.padNodes.push(lfo);

    voices.forEach(v => {
      const osc = this.ctx.createOscillator();
      osc.type = v.type;
      osc.frequency.value = v.f;
      osc.detune.value = v.det;
      const g = this.ctx.createGain();
      g.gain.value = v.gain;
      osc.connect(g); g.connect(breath);

      // gentle vibrato per voice for organic motion
      const vib = this.ctx.createOscillator();
      vib.frequency.value = 0.12 + Math.random() * 0.10;
      const vibG = this.ctx.createGain();
      vibG.gain.value = v.f * 0.0025;
      vib.connect(vibG); vibG.connect(osc.frequency);
      vib.start();

      osc.start();
      this.padNodes.push(osc, vib);
    });
  }

  stopPad(fadeOut = 7) {
    if (!this.padFade) return;
    const t0 = this.ctx.currentTime;
    this.padFade.gain.cancelScheduledValues(t0);
    this.padFade.gain.setValueAtTime(this.padFade.gain.value, t0);
    this.padFade.gain.linearRampToValueAtTime(0, t0 + fadeOut);
    setTimeout(() => {
      this.padNodes.forEach(n => { try { n.stop(); } catch(e){} });
      this.padNodes = [];
    }, fadeOut * 1000 + 200);
  }

  /* ---------- Pentatonic melody (gentle, sparse) ---------- */
  playMelodyNote(freq, duration = 6) {
    const t0 = this.ctx.currentTime;
    const env = this.ctx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.55, t0 + 1.6);
    env.gain.linearRampToValueAtTime(0.30, t0 + duration * 0.55);
    env.gain.linearRampToValueAtTime(0.0, t0 + duration);
    env.connect(this.melBus);

    // Fundamental + soft octave + warm triangle for body
    const o1 = this.ctx.createOscillator(); o1.type = 'sine';     o1.frequency.value = freq;
    const o2 = this.ctx.createOscillator(); o2.type = 'sine';     o2.frequency.value = freq * 2;
    const o3 = this.ctx.createOscillator(); o3.type = 'triangle'; o3.frequency.value = freq; o3.detune.value = 5;
    const g1 = this.ctx.createGain(); g1.gain.value = 1.0;
    const g2 = this.ctx.createGain(); g2.gain.value = 0.18;
    const g3 = this.ctx.createGain(); g3.gain.value = 0.13;
    o1.connect(g1); o2.connect(g2); o3.connect(g3);
    g1.connect(env); g2.connect(env); g3.connect(env);

    [o1, o2, o3].forEach(o => { o.start(t0); o.stop(t0 + duration + 0.2); });

    if (this.onMelodyNote) this.onMelodyNote(freq);
  }

  startMelody() {
    // F major pentatonic, weighted to mid-range — peaceful, "归元"
    const scale = [174.61, 196.00, 220.00, 261.63, 293.66, 349.23, 392.00, 440.00, 523.25];
    let idx = 4;
    const next = () => {
      const step = Math.floor(Math.random() * 7) - 3;
      idx = Math.max(0, Math.min(scale.length - 1, idx + step));
      const dur = 5.5 + Math.random() * 3;
      this.playMelodyNote(scale[idx], dur);

      // Occasional gentle harmony a fifth/third below
      if (Math.random() < 0.28) {
        setTimeout(() => {
          const hi = Math.max(0, idx - 2);
          this.playMelodyNote(scale[hi], dur * 0.8);
        }, 1100 + Math.random() * 1400);
      }

      const gap = 6500 + Math.random() * 4500;
      this.melodyTimer = setTimeout(next, gap);
    };
    // Begin after pad establishes
    this.melodyTimer = setTimeout(next, 5000);
  }

  stopMelody() {
    if (this.melodyTimer) { clearTimeout(this.melodyTimer); this.melodyTimer = null; }
  }
}

/* ============================================================
   Visuals — synced to audio breath + melody ripples
   ============================================================ */
const canvas = document.getElementById('canvas');
const ctx2d = canvas.getContext('2d');
let W = 0, H = 0, CX = 0, CY = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const size = Math.min(window.innerWidth * 0.85, window.innerHeight * 0.5, 480);
  canvas.width = Math.floor(size * DPR);
  canvas.height = Math.floor(size * DPR);
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx2d.setTransform(1, 0, 0, 1, 0, 0);
  ctx2d.scale(DPR, DPR);
  W = size; H = size;
  CX = W / 2; CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

let intensity = 0;          // overall visual presence (0..1)
let intensityTarget = 0;
let ripples = [];
let bellFlash = 0;
let hueDrift = 0;

function startTimeNow() { return performance.now() / 1000; }
const epoch = startTimeNow();

function draw() {
  ctx2d.clearRect(0, 0, W, H);

  // smooth intensity
  intensity += (intensityTarget - intensity) * 0.02;
  bellFlash *= 0.985;
  hueDrift += 0.02;

  // Synced breathing phase (matches audio LFO 6s)
  const t = startTimeNow() - epoch;
  const breath = (Math.sin((t / 6) * Math.PI * 2) + 1) / 2; // 0..1

  const baseR = Math.min(W, H) * 0.18;
  const r = baseR * (1 + breath * 0.22 * intensity) + bellFlash * 30;

  // Outer halos
  for (let i = 6; i >= 1; i--) {
    const rr = r * (1 + i * 0.32);
    const a = 0.05 * intensity * (1 - i / 7) + bellFlash * 0.05;
    const grad = ctx2d.createRadialGradient(CX, CY, r, CX, CY, rr);
    grad.addColorStop(0, `hsla(${42 + Math.sin(hueDrift * 0.05) * 8}, 55%, 62%, ${a})`);
    grad.addColorStop(1, 'transparent');
    ctx2d.fillStyle = grad;
    ctx2d.beginPath(); ctx2d.arc(CX, CY, rr, 0, Math.PI * 2); ctx2d.fill();
  }

  // Melody ripples
  ripples = ripples.filter(rp => rp.life > 0);
  ripples.forEach(rp => {
    rp.life -= 0.0055;
    rp.radius += 0.55;
    const a = rp.life * 0.45;
    ctx2d.strokeStyle = `hsla(${rp.hue}, 50%, 72%, ${a})`;
    ctx2d.lineWidth = 1.2;
    ctx2d.beginPath();
    ctx2d.arc(CX, CY, baseR + rp.radius, 0, Math.PI * 2);
    ctx2d.stroke();
  });

  // Inner orb
  const orb = ctx2d.createRadialGradient(CX, CY - r * 0.25, 0, CX, CY, r);
  orb.addColorStop(0, `hsla(${46 + breath * 8}, 65%, 78%, ${0.55 + intensity * 0.35 + bellFlash * 0.3})`);
  orb.addColorStop(0.55, `hsla(36, 50%, 50%, ${0.30 + intensity * 0.25})`);
  orb.addColorStop(1, `hsla(26, 40%, 28%, 0.12)`);
  ctx2d.fillStyle = orb;
  ctx2d.beginPath(); ctx2d.arc(CX, CY, r, 0, Math.PI * 2); ctx2d.fill();

  // Edge ring
  ctx2d.strokeStyle = `hsla(42, 60%, 72%, ${0.35 + intensity * 0.4 + bellFlash * 0.3})`;
  ctx2d.lineWidth = 1.4;
  ctx2d.beginPath(); ctx2d.arc(CX, CY, r, 0, Math.PI * 2); ctx2d.stroke();

  // Center point
  ctx2d.fillStyle = `hsla(46, 75%, 88%, ${0.55 + breath * 0.4 * intensity})`;
  ctx2d.beginPath();
  ctx2d.arc(CX, CY, 2.5 + breath * 2.2 * intensity, 0, Math.PI * 2);
  ctx2d.fill();

  requestAnimationFrame(draw);
}
draw();

function addRipple(hue) { ripples.push({ radius: 0, life: 1, hue }); }

/* ============================================================
   Session Logic
   ============================================================ */
const audio = new MeditationAudio();
const statusEl   = document.getElementById('status');
const timerEl    = document.getElementById('timer');
const durationsEl= document.getElementById('durations');
const volumeEl   = document.getElementById('volume');

const durations = [
  { label: '无限',    value: 0   },
  { label: '5 min',   value: 5   },
  { label: '10 min',  value: 10  },
  { label: '15 min',  value: 15  },
  { label: '20 min',  value: 20  },
  { label: '30 min',  value: 30  },
  { label: '45 min',  value: 45  },
  { label: '1 hour',  value: 60  },
  { label: '1.5 hour',value: 90  },
  { label: '2 hour',  value: 120 },
  { label: '3 hour',  value: 180 },
  { label: '4 hour',  value: 240 }
];
let selectedDuration = 0;

durations.forEach((d, i) => {
  const b = document.createElement('button');
  b.className = 'dur-btn' + (i === 0 ? ' active' : '');
  b.textContent = d.label;
  b.addEventListener('click', () => {
    if (state !== 'idle') return;
    document.querySelectorAll('.dur-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedDuration = d.value;
  });
  durationsEl.appendChild(b);
});

let state = 'idle';   // idle | intro | playing | outro
let scheduled = [];
let timerInt = null;

function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function later(fn, ms) { const id = setTimeout(fn, ms); scheduled.push(id); return id; }
function clearAll() { scheduled.forEach(clearTimeout); scheduled = []; if (timerInt) { clearInterval(timerInt); timerInt = null; } }
function setStatus(text) { statusEl.textContent = text; }
function setButtonsEnabled(enabled) {
  document.querySelectorAll('.dur-btn').forEach(b => b.disabled = !enabled);
}

/* Audio bridges visuals */
audio.onMelodyNote = (freq) => {
  // hue keyed to pitch so ripples shift gently with melody
  const hue = 30 + ((freq - 174) / 360) * 50;
  addRipple(hue);
};
audio.onBellStrike = () => { bellFlash = 1; addRipple(45); };

/* ---- Session start ---- */
function start() {
  if (state !== 'idle') {
    if (state === 'playing' || state === 'intro') endEarly();
    return;
  }
  audio.init();
  if (audio.ctx.state === 'suspended') audio.ctx.resume();
  audio.setVolume(parseInt(volumeEl.value) / 100);

  state = 'intro';
  setButtonsEnabled(false);
  intensityTarget = 1;
  setStatus('准备入静');

  // 1) After 3s, opening bell (gives "几秒间隔")
  later(() => {
    setStatus('');
    audio.playBell(0, 246.94, 9);   // B3 — soft, lower bowl
  }, 3000);

  // 2) After bell settles (~4s after strike), music gently fades in
  later(() => {
    audio.startPad(9);
    audio.startMelody();
    state = 'playing';
    startCountdown();
  }, 7000);
}

function startCountdown() {
  if (selectedDuration === 0) {
    timerEl.textContent = '∞';
    return;
  }
  const total = selectedDuration * 60;
  const t0 = Date.now();
  timerInt = setInterval(() => {
    const elapsed = (Date.now() - t0) / 1000;
    const remain = total - elapsed;
    timerEl.textContent = fmt(remain);
    if (remain <= 0) { clearInterval(timerInt); timerInt = null; beginOutro(); }
  }, 500);

  // Begin outro 8s before end so music has time to fade gracefully
  later(() => {
    if (state === 'playing') beginOutro();
  }, Math.max(0, (total - 8) * 1000));
}

/* ---- Session end (graceful) ---- */
function beginOutro() {
  if (state === 'outro' || state === 'idle') return;
  state = 'outro';
  audio.stopMelody();
  audio.stopPad(7);                   // music fades out (~7s)

  // After music fades + a few seconds pause, ring closing bell
  later(() => {
    audio.playBell(0, 246.94, 11);
    setStatus('静坐圆满');
  }, 10000);                          // 7s fade + ~3s silence

  later(() => setStatus('感恩修行'), 15000);

  later(() => {
    state = 'idle';
    intensityTarget = 0;
    setStatus('点击开始');
    timerEl.textContent = '';
    setButtonsEnabled(true);
  }, 22000);
}

function endEarly() {
  clearAll();
  // ensure music stops cleanly even if intro was still running
  if (audio.padFade) audio.stopPad(5);
  audio.stopMelody();
  state = 'outro';

  later(() => {
    audio.playBell(0, 246.94, 10);
    setStatus('静坐圆满');
  }, 6000);

  later(() => setStatus('感恩修行'), 11000);

  later(() => {
    state = 'idle';
    intensityTarget = 0;
    setStatus('点击开始');
    timerEl.textContent = '';
    setButtonsEnabled(true);
  }, 18000);
}
