<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>归元静坐 - 点击开始</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: #020205;
                overflow: hidden;
                font-family: "STSong", "SimSun", serif;
            }
            canvas {
                display: block;
            }

            #overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: #5a67d8;
                z-index: 10;
                pointer-events: none;
            }

            h1 {
                font-weight: 100;
                font-size: 4.2rem;
                letter-spacing: 16px;
                margin: 0 0 2rem 0;
                text-shadow: 0 0 40px rgba(90, 103, 216, 0.4);
            }
            .hint {
                font-size: 1rem;
                letter-spacing: 6px;
                color: #4a5568;
                margin-bottom: 2.5rem;
            }

            /* 主控制按钮 */
            #startBtn {
                pointer-events: auto;
                padding: 0.65em 2.2em;
                font-size: 1.05rem;
                letter-spacing: 6px;
                background: transparent;
                color: #5a67d8;
                border: 1px solid #3d4a8a;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.3s;
                font-family: inherit;
            }
            #startBtn:hover {
                background: rgba(90, 103, 216, 0.12);
                color: #a0aef8;
            }

            /* 顶部常驻工具栏 */
            #toolbar {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 20;
                display: flex;
                align-items: center;
                gap: 20px;
                padding: 10px 20px;
                background: rgba(20, 30, 50, 0.4);
                border-radius: 30px;
                backdrop-filter: blur(4px);
            }
            #toolbar select {
                padding: 0.3em 0.6em;
                font-size: 0.85rem;
                background: transparent;
                color: #c0caff;
                border: 1px solid #3a4568;
                border-radius: 4px;
                cursor: pointer;
                font-family: inherit;
            }

            /* 极简音量滑动条 */
            .vol-container {
                display: flex;
                align-items: center;
                gap: 8px;
                color: #5a67d8;
                font-size: 0.8rem;
            }
            input[type="range"] {
                -webkit-appearance: none;
                width: 80px;
                height: 2px;
                background: #3a4568;
                outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 10px;
                height: 10px;
                background: #5a67d8;
                border-radius: 50%;
                cursor: pointer;
            }

            /* 结束提示 */
            #endMsg {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 30;
                color: #9aa8f0;
                pointer-events: none;
                opacity: 0;
                transition: opacity 2s;
            }
            #endMsg.show {
                opacity: 1;
            }
            #endMsg .big {
                font-size: 2.8rem;
                letter-spacing: 12px;
                margin-bottom: 1rem;
            }
            #endMsg .sub {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #4a5568;
            }
        </style>
    </head>
    <body>
        <div id="toolbar">
            <select id="duration">
                <option value="0">无限</option>
                <option value="5">5 min</option>
                <option value="10">10 min</option>
                <option value="15" selected>15 min</option>
                <option value="20">20 min</option>
                <option value="30">30 min</option>
                <option value="45">45 min</option>
                <option value="60">1 hour</option>
                <option value="90">1.5 hour</option>
                <option value="120">2 huor</option>
                <option value="180">3 hour</option>
                <option value="240">4 hour</option>
            </select>
            <div class="vol-container">
                <span>音量</span>
                <input
                    type="range"
                    id="masterVol"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0.8"
                />
            </div>
        </div>

        <div id="overlay">
            <h1>归元静坐</h1>
            <div class="hint">静心 · 归元 · 温养</div>
            <button id="startBtn">▶ 开始静坐</button>
        </div>

        <div id="endMsg">
            <div class="big">静坐圆满</div>
            <div class="sub">感恩修行</div>
        </div>

        <canvas id="canvas"></canvas>

        <script>
            // ─── Canvas / Lorenz ───────────────────────────────────────────────
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            let width, height;

            let lx = 0.1,
                ly = 0,
                lz = 0;
            const sigma = 10,
                rho = 28,
                beta = 8 / 3,
                dt = 0.0075;
            let points = [],
                stepCount = 0;
            const maxPoints = 2000;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();

            // ─── 音量参数 ──────────────────────────────────────────────────────
            const NOISE_VOL = 0.0;
            const DRONE_VOL = 0.0;
            const PULSE_VOL = 0.2;
            const BELL_VOL_S = 0.1;
            const BELL_VOL_L = 0.2;

            // ─── State ─────────────────────────────────────────────────────────
            let audioCtx = null;
            let masterGain = null; // 总增益控制
            let isPlaying = false;
            let timerId = null;
            let remaining = 0;
            let isInfinite = true;
            let sessionStart = null;
            let sessionDuration = 0;

            // ─── Audio helpers ─────────────────────────────────────────────────
            function getCtx() {
                if (!audioCtx) {
                    audioCtx = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value =
                        document.getElementById("masterVol").value * 1.5;
                    masterGain.connect(audioCtx.destination);
                }
                return audioCtx;
            }

            function createDeepAmbience() {
                const ac = getCtx();
                function makeReverb(duration = 3, decay = 2) {
                    const len = ac.sampleRate * duration;
                    const buf = ac.createBuffer(2, len, ac.sampleRate);
                    for (let c = 0; c < 2; c++) {
                        const d = buf.getChannelData(c);
                        for (let i = 0; i < len; i++) {
                            d[i] =
                                (Math.random() * 2 - 1) *
                                Math.pow(1 - i / len, decay);
                        }
                    }
                    const conv = ac.createConvolver();
                    conv.buffer = buf;
                    return conv;
                }

                const reverb = makeReverb(4, 2.5);
                reverb.connect(masterGain); // 改为连接到 masterGain

                [40, 40.3].forEach((freq) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = "sine";
                    osc.frequency.value = freq;
                    gain.gain.value = DRONE_VOL;
                    osc.connect(gain);
                    gain.connect(reverb);
                    gain.connect(masterGain);
                    osc.start();
                });

                const lfo = ac.createOscillator();
                const lfoGain = ac.createGain();
                lfo.frequency.value = 1 / 14;
                lfoGain.gain.value = 0.2;
                lfo.type = "sine";
                lfo.start();
                lfo.connect(lfoGain);

                const droneGain = ac.createGain();
                droneGain.gain.value = 0.0;
                lfoGain.connect(droneGain.gain);

                const osc2 = ac.createOscillator();
                osc2.type = "sine";
                osc2.frequency.value = 110;
                osc2.connect(droneGain);
                droneGain.connect(reverb);
                osc2.start();
            }

            function createNatureAmbience() {
                const ac = getCtx();
                const bufSize = ac.sampleRate * 4;
                const noiseBuffer = ac.createBuffer(1, bufSize, ac.sampleRate);
                const data = noiseBuffer.getChannelData(0);
                let b0 = 0,
                    b1 = 0,
                    b2 = 0,
                    b3 = 0,
                    b4 = 0,
                    b5 = 0;
                for (let i = 0; i < bufSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.969 * b2 + white * 0.153852;
                    b3 = 0.8665 * b3 + white * 0.3104856;
                    b4 = 0.55 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.016898;
                    data[i] =
                        (b0 + b1 + b2 + b3 + b4 + b5 + white * 0.5362) * 0.11;
                }
                const source = ac.createBufferSource();
                source.buffer = noiseBuffer;
                source.loop = true;

                const filter = ac.createBiquadFilter();
                filter.type = "bandpass";
                filter.frequency.value = 600;
                filter.Q.value = 0.4;

                const gain = ac.createGain();
                gain.gain.value = NOISE_VOL;

                source.connect(filter).connect(gain).connect(masterGain);
                source.start();
            }

            function playPulse(freq = 50, vol = PULSE_VOL, decay = 0.55) {
                const ac = getCtx();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(freq, ac.currentTime);
                osc.frequency.exponentialRampToValueAtTime(
                    20,
                    ac.currentTime + decay,
                );
                gain.gain.setValueAtTime(vol, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(
                    0.001,
                    ac.currentTime + decay,
                );
                osc.connect(gain).connect(masterGain);
                osc.start();
                osc.stop(ac.currentTime + decay + 0.05);
            }

            const scale = [
                196.0, 220.0, 261.63, 293.66, 329.63, 392.0, 440.0, 523.25,
            ];

            function playGuqinNode(lx, lz) {
                const ac = getCtx();
                const osc = ac.createOscillator();
                const g = ac.createGain();
                const filter = ac.createBiquadFilter();
                const pan = ac.createStereoPanner();

                filter.type = "lowpass";
                filter.frequency.value = 3000;

                const idx = Math.floor(Math.abs(lx) % scale.length);
                osc.frequency.value = scale[idx];
                osc.type = "sine";
                pan.pan.value = Math.max(-1, Math.min(1, lx / 25));

                g.gain.setValueAtTime(0, ac.currentTime);
                g.gain.linearRampToValueAtTime(0.022, ac.currentTime + 1);
                g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 10);

                osc.connect(filter).connect(g).connect(pan).connect(masterGain);
                osc.start();
                osc.stop(ac.currentTime + 11);
            }

            function playBell(delay = 0, duration = 6, volume = 0.35) {
                const ac = getCtx();
                const partials = [
                    { ratio: 1, vol: 1.0 },
                    { ratio: 2.76, vol: 0.4 },
                    { ratio: 5.4, vol: 0.25 },
                    { ratio: 8.93, vol: 0.12 },
                ];
                const baseFreq = 220;

                partials.forEach(({ ratio, vol }) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = "sine";
                    osc.frequency.value = baseFreq * ratio;
                    const t0 = ac.currentTime + delay;
                    gain.gain.setValueAtTime(0, t0);
                    gain.gain.linearRampToValueAtTime(volume * vol, t0 + 0.01);
                    gain.gain.exponentialRampToValueAtTime(
                        0.001,
                        t0 + duration,
                    );
                    osc.connect(gain).connect(masterGain);
                    osc.start(t0);
                    osc.stop(t0 + duration + 0.1);
                });
            }

            function ringEndBells() {
                playBell(0.3, 3, BELL_VOL_S);
                playBell(1.8, 8, BELL_VOL_L);
            }

            function makeSilentAudio() {
                const wav = new Uint8Array([
                    0x52, 0x49, 0x46, 0x46, 0x26, 0x00, 0x00, 0x00, 0x57, 0x41,
                    0x56, 0x45, 0x66, 0x6d, 0x74, 0x20, 0x10, 0x00, 0x00, 0x00,
                    0x01, 0x00, 0x01, 0x00, 0x44, 0xac, 0x00, 0x00, 0x88, 0x58,
                    0x01, 0x00, 0x02, 0x00, 0x10, 0x00, 0x64, 0x61, 0x74, 0x61,
                    0x02, 0x00, 0x00, 0x00, 0x00, 0x00,
                ]);
                const b64 = btoa(String.fromCharCode(...wav));
                const el = document.createElement("audio");
                el.src = "data:audio/wav;base64," + b64;
                el.loop = true;
                el.volume = 0;
                document.body.appendChild(el);
                return el;
            }
            let _silentAudio = null;

            // ─── 播放控制 ──────────────────────────────────────────────────────
            let pulseInterval = null;

            function startAudio() {
                const ac = getCtx();
                if (ac.state === "suspended") ac.resume();

                if (!_silentAudio) _silentAudio = makeSilentAudio();
                _silentAudio.play().catch(() => {});

                if (!startAudio._initialized) {
                    createDeepAmbience();
                    createNatureAmbience();
                    startAudio._initialized = true;
                }

                pulseInterval = setInterval(() => {
                    if (isPlaying) playPulse(50, PULSE_VOL, 0.55);
                }, 1000);
            }

            function stopAudio() {
                clearInterval(pulseInterval);
                if (_silentAudio) _silentAudio.pause();
                if (audioCtx) audioCtx.suspend();
            }

            // ─── 定时器 ────────────────────────────────────────────────────────
            function startTimer() {
                stopTimer();
                const val = parseInt(document.getElementById("duration").value);
                isInfinite = val === 0;
                if (isInfinite) {
                    document.title = "归元静坐";
                    return;
                }
                sessionDuration = val * 60;
                sessionStart = Date.now();
                remaining = sessionDuration;
                updateTitle();

                timerId = setInterval(() => {
                    const elapsed = Math.floor(
                        (Date.now() - sessionStart) / 1000,
                    );
                    remaining = sessionDuration - elapsed;
                    if (remaining <= 0) {
                        remaining = 0;
                        endSession();
                    } else {
                        updateTitle();
                    }
                }, 500);
            }

            function stopTimer() {
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
            }

            function updateTitle() {
                if (isInfinite || remaining <= 0) return;
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                document.title = `归元静坐 - ${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
            }

            function endSession() {
                stopTimer();
                isPlaying = false;
                document.getElementById("startBtn").innerHTML = "▶ 开始静坐";

                const ac = getCtx();
                const doRing = () => {
                    ringEndBells();
                    setTimeout(() => {
                        if (audioCtx) audioCtx.suspend();
                    }, 11000);
                };

                if (ac.state === "suspended") ac.resume().then(doRing);
                else doRing();

                setTimeout(() => {
                    document.getElementById("endMsg").classList.add("show");
                    document.title = "归元静坐 - 圆满";
                }, 600);
            }

            // ─── UI 事件 ───────────────────────────────────────────────────────
            const startBtn = document.getElementById("startBtn");
            const masterVol = document.getElementById("masterVol");

            startBtn.addEventListener("click", () => {
                if (!isPlaying) {
                    // 开始播放
                    isPlaying = true;
                    startBtn.innerHTML = "■ 停止";
                    document.getElementById("endMsg").classList.remove("show");
                    startAudio();
                    startTimer();
                } else {
                    // 停止播放
                    isPlaying = false;
                    startBtn.innerHTML = "▶ 开始静坐";
                    stopAudio();
                    stopTimer();
                    document.title = "归元静坐 - 已停止";
                }
            });

            masterVol.addEventListener("input", (e) => {
                if (masterGain) {
                    masterGain.gain.setTargetAtTime(
                        e.target.value,
                        getCtx().currentTime,
                        0.05,
                    );
                }
            });

            document
                .getElementById("duration")
                .addEventListener("change", () => {
                    if (isPlaying) {
                        isPlaying = false;
                        startBtn.innerHTML = "▶ 开始静坐";
                        stopAudio();
                        stopTimer();
                    }
                });

            // ─── 动画循环 ──────────────────────────────────────────────────────
            function animate() {
                const dx = sigma * (ly - lx) * dt;
                const dy = (lx * (rho - lz) - ly) * dt;
                const dz = (lx * ly - beta * lz) * dt;
                lx += dx;
                ly += dy;
                lz += dz;

                stepCount++;
                if (isPlaying && stepCount % 40 === 0 && Math.abs(lx) > 10) {
                    playGuqinNode(lx, lz);
                }

                points.push({ x: lx, y: ly, z: lz });
                if (points.length > maxPoints) points.shift();

                ctx.fillStyle = "rgba(2,2,5,0.15)";
                ctx.fillRect(0, 0, width, height);

                ctx.save();
                ctx.translate(width / 2, height * 0.85);
                const s = 14;

                ctx.beginPath();
                ctx.strokeStyle = "#1a202c";
                ctx.lineWidth = 1;
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x * s, -points[i].z * s);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(lx * s, -lz * s, 3.5, 0, Math.PI * 2);
                const hue = 220 + lz / 2;
                ctx.fillStyle = `hsla(${hue},40%,50%,0.8)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsla(${hue},50%,40%,0.5)`;
                ctx.fill();
                ctx.restore();

                requestAnimationFrame(animate);
            }
            animate();
        </script>
    </body>
</html>
